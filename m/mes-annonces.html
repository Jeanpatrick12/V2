<script>
SA.init().then(function(){
  var u = SA.getUser();
  if(!u){ document.getElementById('notLoggedIn').style.display=''; return; }
  document.getElementById('myContent').style.display='';
  var mine = SA.getUserListings ? SA.getUserListings() : SA.getAllListings().filter(function(l){ return l.owner_id === u.id; });
  document.getElementById('myCount').textContent = mine.length;
  var el = document.getElementById('myList');
  if(!mine.length){
    el.innerHTML = '<div style="padding:40px var(--pad);text-align:center">' +
      '<i class="ti ti-home-plus" style="font-size:40px;color:#ddd;display:block;margin-bottom:14px"></i>' +
      '<h3 style="font-size:17px;font-weight:700;margin-bottom:8px">Aucune annonce</h3>' +
      '<p style="font-size:13px;color:var(--text2);margin-bottom:20px">Publiez votre premier bien gratuitement.</p>' +
      '<button class="m-btn m-btn-primary m-btn-full" onclick="window.location=\'/deposer-gate\'"><i class="ti ti-plus"></i> Déposer une annonce</button>' +
    '</div>';
    return;
  }
  el.innerHTML = mine.map(function(l){
    var _photos=Array.isArray(l.photos)?l.photos:[];var _mp=_photos[0]?(_photos[0].url||_photos[0]):null;
    var _grad=(SA.IMG_GRADIENTS&&SA.IMG_GRADIENTS[l.img])||'linear-gradient(135deg,#4f6d9e,#7890b8)';
    var photoBg=_mp?'background-image:url('+_mp+');background-size:cover;background-position:center':'background:'+_grad;
    var priceNum = l.price ? l.price.toLocaleString('fr-FR')+'€'+(l.transaction==='location'?'/mois':'') : 'Prix non défini';
    var priceM2 = (l.price && l.surface && l.transaction!=='location') ? ' <span style="font-size:11px;font-weight:500;color:#999">'+Math.round(l.price/l.surface).toLocaleString('fr-FR')+'€/m²</span>' : '';
    var txBadge = l.transaction==='location'?'<span class="m-my-badge m-my-badge-location">Location</span>':'<span class="m-my-badge m-my-badge-vente">Vente</span>';
    var status = l.status==='active'?'En ligne':l.status==='sold'?'Vendue':'En attente';
    var statusCls = l.status==='active'?'m-my-badge-active':l.status==='sold'?'m-my-badge-sold':'m-my-badge-pending';
    var soldBtn = (l.status!=='sold' && l.transaction!=='location') ? '<button class="m-btn m-btn-sm" style="background:#16a34a;color:white;border:none;width:100%;justify-content:center" onclick="markSold(\''+l.id+'\')"><i class="ti ti-check"></i> Marquer vendue</button>' : '';
    return '<div class="m-my-card">' +
      '<div class="m-my-card-photo" style="'+photoBg+'"></div>' +
      '<div class="m-my-card-body">' +
        '<div class="m-my-card-badges">'+txBadge+'<span class="m-my-badge '+statusCls+'">'+status+'</span></div>' +
        '<div class="m-my-card-price">'+priceNum+priceM2+'</div>' +
        '<div class="m-my-card-title">'+(l.titre||(SA.TYPE_LABELS&&SA.TYPE_LABELS[l.type]||l.type||'Bien'))+'</div>' +
        '<div class="m-my-card-meta">'+(l.surface?'<span><i class="ti ti-ruler-2"></i> '+l.surface+' m²</span>':'')+(l.pieces?'<span><i class="ti ti-door"></i> '+l.pieces+'p</span>':'')+(l.ville?'<span><i class="ti ti-map-pin"></i> '+l.ville+'</span>':'')+'</div>' +
        '<div class="m-my-card-actions">' +
          '<div class="m-my-card-actions-row">' +
            '<button class="m-btn m-btn-secondary m-btn-sm" onclick="SA.openListing(\''+l.id+'\')"><i class="ti ti-eye"></i></button>' +
            '<button class="m-btn m-btn-secondary m-btn-sm" style="flex:1" onclick="openEditModal(\''+l.id+'\')"><i class="ti ti-edit"></i> Modifier</button>' +
          '</div>' +
          (soldBtn?'<div>'+soldBtn+'</div>':'') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
});

function markSold(id){
  var all=SA.getAllListings?SA.getAllListings():[];
  var l=all.find(function(x){return x.id===id;});
  if(!l)return;
  if(!confirm('Marquer "'+((l.titre||l.type||'ce bien'))+'" comme vendu ?'))return;
  l.status='sold';
  try{
    var key='sa_listings';
    var saved=JSON.parse(localStorage.getItem(key)||'[]');
    var idx=saved.findIndex(function(x){return x.id===id;});
    if(idx!==-1){saved[idx].status='sold';localStorage.setItem(key,JSON.stringify(saved));}
  }catch(e){}
  window.location.reload();
}
</script>

<script>
var _editId=null;
var _emDpe=null;
var _emGes=null;
var _emNewPhotos=[];

function selectDpe(type,letter){
  if(type==='dpe'){
    _emDpe=letter;
    document.querySelectorAll('#emDpeRow .em-dpe-btn').forEach(function(b){b.classList.toggle('active',b.dataset.letter===letter);});
  } else {
    _emGes=letter;
    document.querySelectorAll('#emGesRow .em-dpe-btn').forEach(function(b){b.classList.toggle('active',b.dataset.letter===letter);});
  }
}

function handleEmPhotos(input){
  var files=Array.from(input.files);
  files.forEach(function(f){
    var reader=new FileReader();
    reader.onload=function(e){
      _emNewPhotos.push(e.target.result);
      renderEmPhotos();
    };
    reader.readAsDataURL(f);
  });
  input.value='';
}

var _emCurrentPhotos=[];
function renderEmPhotos(){
  var all=_emCurrentPhotos.concat(_emNewPhotos);
  var el=document.getElementById('emPhotos');
  el.innerHTML='';
  if(!all.length){el.innerHTML='<div style="color:#94a3b8;font-size:13px;padding:4px 0 8px">Aucune photo</div>';return;}
  all.forEach(function(p,i){
    var wrap=document.createElement('div');
    wrap.className='em-photo-wrap';
    wrap.innerHTML='<img src="'+p+'" class="em-photo-img'+(i===0?' main':'')+'">'+(i===0?'<span class="em-photo-badge">Principale</span>':'');
    el.appendChild(wrap);
  });
}

function openEditModal(id){
  var all=SA.getAllListings?SA.getAllListings():[];
  var l=all.find(function(x){return x.id===id;});
  if(!l)return;
  _editId=id;
  _emDpe=l.dpe||null;
  _emGes=l.ges||null;
  _emNewPhotos=[];
  _emCurrentPhotos=l.photos&&l.photos.length?l.photos:(l.photo?[l.photo]:[]);

  document.getElementById('emDesc').value=l.description||l.desc||'';
  document.getElementById('emPrix').value=l.prix||l.price||'';
  document.getElementById('emSurface').value=l.surface||'';
  document.getElementById('emPieces').value=l.pieces||'';
  document.getElementById('emChambres').value=l.chambres||'';
  document.getElementById('emSdb').value=l.sdb||'';
  document.getElementById('emSde').value=l.sde||'';
  document.getElementById('emAnnee').value=l.annee||l.anneeConstruction||'';
  document.getElementById('emFacture').value=l.factureEnergie||l.facture_energie||'';
  document.getElementById('emEtat').value=l.etatGeneral||l.etat_general||'';

  // DPE + GES
  document.querySelectorAll('#emDpeRow .em-dpe-btn').forEach(function(b){b.classList.toggle('active',b.dataset.letter===_emDpe);});
  document.querySelectorAll('#emGesRow .em-dpe-btn').forEach(function(b){b.classList.toggle('active',b.dataset.letter===_emGes);});

  // Caractéristiques
  var equip=l.equipements||[];
  document.querySelectorAll('#emFeatures input[type=checkbox]').forEach(function(cb){
    cb.checked=equip.indexOf(cb.value)!==-1;
  });

  renderEmPhotos();
  document.getElementById('editModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeEditModal(){
  document.getElementById('editModal').classList.remove('open');
  document.body.style.overflow='';
  _editId=null;
}

function saveEdit(){
  if(!_editId)return;
  try{
    var key='sa_listings';
    var saved=JSON.parse(localStorage.getItem(key)||'[]');
    var idx=saved.findIndex(function(x){return x.id===_editId;});
    if(idx!==-1){
      var f=saved[idx];
      var desc=document.getElementById('emDesc').value;
      var prix=document.getElementById('emPrix').value;
      var surf=document.getElementById('emSurface').value;
      var pieces=document.getElementById('emPieces').value;
      var chambres=document.getElementById('emChambres').value;
      var sdb=document.getElementById('emSdb').value;
      var sde=document.getElementById('emSde').value;
      var annee=document.getElementById('emAnnee').value;
      var facture=document.getElementById('emFacture').value;
      var etat=document.getElementById('emEtat').value;
      if(desc)f.description=desc;
      if(prix)f.prix=parseFloat(prix);
      if(surf)f.surface=parseFloat(surf);
      if(pieces)f.pieces=parseInt(pieces);
      if(chambres)f.chambres=parseInt(chambres);
      if(sdb)f.sdb=parseInt(sdb);
      if(sde)f.sde=parseInt(sde);
      if(annee)f.annee=parseInt(annee);
      if(facture)f.factureEnergie=parseFloat(facture);
      if(etat)f.etatGeneral=etat;
      if(_emDpe)f.dpe=_emDpe;
      if(_emGes)f.ges=_emGes;
      var equip=[];
      document.querySelectorAll('#emFeatures input[type=checkbox]:checked').forEach(function(cb){equip.push(cb.value);});
      f.equipements=equip;
      var allPhotos=_emCurrentPhotos.concat(_emNewPhotos);
      if(allPhotos.length){f.photos=allPhotos;f.photo=allPhotos[0];}
      localStorage.setItem(key,JSON.stringify(saved));
    }
  }catch(e){}
  closeEditModal();
  window.location.reload();
}
</script>
